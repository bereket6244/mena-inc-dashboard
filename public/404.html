<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Redirecting to Mena CRM</title>
    <script>
      (function() {
        var base = '/';
        var next = base + window.location.search + window.location.hash;
        window.location.replace(next);
      })();
    </script>
  </head>
  <body>
    <a href="/">Open Mena CRM</a>
  </body>
</html>
