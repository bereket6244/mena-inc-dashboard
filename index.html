      // Global safety script to defend against read-only/getter-only fetch crashes in sandbox environments
      (function() {
        try {
          // Pre-emptively satisfy formdata-polyfill verification so it skips setup
          if (typeof window !== 'undefined' && typeof window.FormData !== 'undefined') {
            if (!window.FormData.prototype.keys) {
              window.FormData.prototype.keys = function() { return []; };
            }
          }
          
          // Patch fetch in window to safely accept setter assignments
          const originalFetch = window.fetch;
          let currentFetch = originalFetch;
          try {
            Object.defineProperty(window, 'fetch', {
              get() { return currentFetch; },
              set(v) { 
                console.log("Safe fetch interceptor: Redirected custom fetch assignment.");
                currentFetch = v; 
              },
              configurable: true,
              enumerable: true
            });
          } catch(e) {
            // If window.fetch is sealed/unconfigurable, define it on globalThis as an fallback
            if (typeof globalThis !== 'undefined') {
              let currentGlobalFetch = globalThis.fetch || originalFetch;
              try {
                Object.defineProperty(globalThis, 'fetch', {
                  get() { return currentGlobalFetch; },
                  set(v) { currentGlobalFetch = v; },
                  configurable: true,
                  enumerable: true
                });
              } catch(inner) {}
            }
          }
        } catch(err) {
          console.warn("Safe fetch interceptor initialization bypassed:", err);
        }
      })();
