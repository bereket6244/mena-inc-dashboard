<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Mena Inc. Advanced Database & Inventory System v2</title>
    
    <!-- 📦 PROGRESSIVE WEB APP (PWA) ENHANCEMENTS FOR SYSTEM ACCESSIBILITY -->
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <meta name="theme-color" content="#0A0A0A" />
    <link id="app-favicon-shortcut" rel="shortcut icon" type="image/png" href="%BASE_URL%mena-favicon-dark.png" />
    <link id="app-favicon" rel="icon" type="image/png" href="%BASE_URL%mena-favicon-dark.png" />
    <script>
      // Clear old service workers before module loading; stale workers can serve HTML for JS chunks.
      (function() {
        if (!('serviceWorker' in navigator)) return;
        navigator.serviceWorker.getRegistrations()
          .then(function(registrations) {
            return Promise.all(registrations.map(function(registration) {
              return registration.unregister();
            }));
          })
          .then(function(results) {
            if (navigator.serviceWorker.controller && results.some(Boolean) && !sessionStorage.getItem('mena_sw_cleanup_reloaded')) {
              sessionStorage.setItem('mena_sw_cleanup_reloaded', '1');
              window.location.reload();
            }
          })
          .catch(function() {});
      })();
    </script>
    <script>
      (function() {
        try {
          var manifestHref = document.querySelector('link[rel="manifest"]')?.getAttribute('href') || '/';
          var baseUrl = manifestHref.replace(/manifest\.json(?:\?.*)?$/, '');
          var savedTheme = 'dark';
          document.documentElement.classList.toggle('light-theme', savedTheme === 'light');
          var faviconHref = baseUrl + (savedTheme === 'light' ? 'mena-favicon-light.png' : 'mena-favicon-dark.png');
          var shortcutIcon = document.getElementById('app-favicon-shortcut');
          var icon = document.getElementById('app-favicon');
          if (shortcutIcon) shortcutIcon.setAttribute('href', faviconHref);
          if (icon) icon.setAttribute('href', faviconHref);
        } catch (_) {}
      })();
    </script>
    <style>
      html, body, #root {
        min-height: 100%;
      }
      body {
        margin: 0;
      }
    </style>

    <!-- iOS Native Integration Features -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Mena CRM" />
    <link rel="apple-touch-icon" href="%BASE_URL%mena-favicon-light.png" />
    <link rel="apple-touch-startup-image" href="%BASE_URL%mena-favicon-light.png" />

    <script>
      // Global safety script to defend against read-only/getter-only fetch crashes in sandbox environments
      (function() {
        try {
          // Pre-emptively satisfy formdata-polyfill verification so it skips setup
          if (typeof window !== 'undefined' && typeof window.FormData !== 'undefined') {
            if (!window.FormData.prototype.keys) {
              window.FormData.prototype.keys = function() { return []; };
            }
          }
          
          // Patch fetch in window to safely accept setter assignments
          const originalFetch = window.fetch;
          let currentFetch = originalFetch;
          try {
            Object.defineProperty(window, 'fetch', {
              get() { return currentFetch; },
              set(v) { 
                console.log("Safe fetch interceptor: Redirected custom fetch assignment.");
                currentFetch = v; 
              },
              configurable: true,
              enumerable: true
            });
          } catch(e) {
            // If window.fetch is sealed/unconfigurable, define it on globalThis as an fallback
            if (typeof globalThis !== 'undefined') {
              let currentGlobalFetch = globalThis.fetch || originalFetch;
              try {
                Object.defineProperty(globalThis, 'fetch', {
                  get() { return currentGlobalFetch; },
                  set(v) { currentGlobalFetch = v; },
                  configurable: true,
                  enumerable: true
                });
              } catch(inner) {}
            }
          }
        } catch(err) {
          console.warn("Safe fetch interceptor initialization bypassed:", err);
        }
      })();

      // Disable pinch-to-zoom and multi-touch scaling gestures (except for proforma preview)
      document.addEventListener('touchstart', function(event) {
        if (event.touches.length > 1) {
          if (event.target.closest('.react-transform-wrapper') || event.target.closest('.react-transform-component')) {
            return;
          }
          event.preventDefault();
        }
      }, { passive: false });

      // Disable iOS gesture zoom (except for proforma preview)
      document.addEventListener('gesturestart', function(event) {
        if (event.target.closest('.react-transform-wrapper') || event.target.closest('.react-transform-component')) {
            return;
        }
        event.preventDefault();
      });

    </script>
    
  </head>
  <body>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(key) {
            caches.delete(key);
          });
        });
      }
    </script>
  </body>
</html>
