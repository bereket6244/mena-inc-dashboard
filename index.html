<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Mena Inc. Advanced Database & Inventory System v2</title>
    
    <!-- 📦 PROGRESSIVE WEB APP (PWA) ENHANCEMENTS FOR SYSTEM ACCESSIBILITY -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0A0A0A" />
    <link id="app-favicon-shortcut" rel="shortcut icon" type="image/png" href="/mena-favicon-dark.png" />
    <link id="app-favicon" rel="icon" type="image/png" href="/mena-favicon-dark.png" />
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('mena_inc_theme_v3') || 'dark';
          document.documentElement.classList.toggle('light-theme', savedTheme === 'light');
          var faviconHref = savedTheme === 'light' ? '/mena-favicon-light.png' : '/mena-favicon-dark.png';
          var shortcutIcon = document.getElementById('app-favicon-shortcut');
          var icon = document.getElementById('app-favicon');
          if (shortcutIcon) shortcutIcon.setAttribute('href', faviconHref);
          if (icon) icon.setAttribute('href', faviconHref);
        } catch (_) {}
      })();
    </script>
    <style>
      :root {
        color-scheme: dark;
        --launch-bg: #0f0e0d;
        --launch-panel: #1b1816;
        --launch-panel-soft: #211e1b;
        --launch-border: #332e29;
        --launch-text: #f3eee8;
        --launch-muted: #b7aa9d;
        --launch-pink: #ee317b;
        --launch-green: #71b536;
      }

      :root.light-theme {
        color-scheme: light;
        --launch-bg: #f7f5f2;
        --launch-panel: #ffffff;
        --launch-panel-soft: #ece7e1;
        --launch-border: #ded6cd;
        --launch-text: #171412;
        --launch-muted: #675f56;
      }

      html, body, #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: var(--launch-bg);
      }

      .app-launch-shell {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        gap: 14px;
        box-sizing: border-box;
        padding: max(18px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
        background:
          radial-gradient(circle at top left, rgba(238, 49, 123, 0.08), transparent 18rem),
          linear-gradient(180deg, var(--launch-bg), #0b0a09);
        color: var(--launch-text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        transition: opacity 180ms ease, visibility 180ms ease;
      }

      .app-launch-shell.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .app-launch-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .app-launch-brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .app-launch-logo {
        width: 38px;
        height: 38px;
        border-radius: 8px;
        object-fit: cover;
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
      }

      .app-launch-title {
        margin: 0;
        font-size: 15px;
        font-weight: 800;
        line-height: 1.1;
      }

      .app-launch-subtitle {
        margin-top: 3px;
        color: var(--launch-muted);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .app-launch-status {
        flex: 0 0 auto;
        border: 1px solid rgba(113, 181, 54, 0.42);
        color: var(--launch-green);
        border-radius: 999px;
        padding: 6px 9px;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: rgba(113, 181, 54, 0.1);
      }

      .app-launch-card {
        border: 1px solid var(--launch-border);
        background: var(--launch-panel);
        border-radius: 8px;
        padding: 14px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.22);
      }

      .app-launch-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .app-launch-stat {
        min-height: 58px;
        border: 1px solid var(--launch-border);
        border-radius: 8px;
        background: var(--launch-panel-soft);
        padding: 10px;
      }

      .app-launch-label {
        color: var(--launch-muted);
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .app-launch-value {
        margin-top: 8px;
        font-size: 20px;
        font-weight: 900;
        line-height: 1;
      }

      .app-launch-bars {
        display: grid;
        gap: 9px;
        margin-top: 14px;
      }

      .app-launch-bar {
        overflow: hidden;
        height: 13px;
        border-radius: 999px;
        background: var(--launch-panel-soft);
        border: 1px solid var(--launch-border);
      }

      .app-launch-bar::before {
        content: "";
        display: block;
        width: var(--w, 70%);
        height: 100%;
        background: linear-gradient(90deg, rgba(238, 49, 123, 0.35), rgba(113, 181, 54, 0.32), rgba(238, 49, 123, 0.35));
        background-size: 220% 100%;
        animation: appLaunchShimmer 1.1s linear infinite;
      }

      .app-launch-foot {
        margin-top: auto;
        color: var(--launch-muted);
        font-size: 11px;
        line-height: 1.4;
      }

      @keyframes appLaunchShimmer {
        from { background-position: 100% 0; }
        to { background-position: -100% 0; }
      }
    </style>

    <!-- iOS Native Integration Features -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Mena CRM" />
    <link rel="apple-touch-icon" href="/mena-favicon-light.png" />
    <link rel="apple-touch-startup-image" href="/mena-favicon-light.png" />

    <script>
      // Global safety script to defend against read-only/getter-only fetch crashes in sandbox environments
      (function() {
        try {
          // Pre-emptively satisfy formdata-polyfill verification so it skips setup
          if (typeof window !== 'undefined' && typeof window.FormData !== 'undefined') {
            if (!window.FormData.prototype.keys) {
              window.FormData.prototype.keys = function() { return []; };
            }
          }
          
          // Patch fetch in window to safely accept setter assignments
          const originalFetch = window.fetch;
          let currentFetch = originalFetch;
          try {
            Object.defineProperty(window, 'fetch', {
              get() { return currentFetch; },
              set(v) { 
                console.log("Safe fetch interceptor: Redirected custom fetch assignment.");
                currentFetch = v; 
              },
              configurable: true,
              enumerable: true
            });
          } catch(e) {
            // If window.fetch is sealed/unconfigurable, define it on globalThis as an fallback
            if (typeof globalThis !== 'undefined') {
              let currentGlobalFetch = globalThis.fetch || originalFetch;
              try {
                Object.defineProperty(globalThis, 'fetch', {
                  get() { return currentGlobalFetch; },
                  set(v) { currentGlobalFetch = v; },
                  configurable: true,
                  enumerable: true
                });
              } catch(inner) {}
            }
          }
        } catch(err) {
          console.warn("Safe fetch interceptor initialization bypassed:", err);
        }
      })();

      // Disable pinch-to-zoom and multi-touch scaling gestures (except for proforma preview)
      document.addEventListener('touchstart', function(event) {
        if (event.touches.length > 1) {
          if (event.target.closest('.react-transform-wrapper') || event.target.closest('.react-transform-component')) {
            return;
          }
          event.preventDefault();
        }
      }, { passive: false });

      // Disable iOS gesture zoom (except for proforma preview)
      document.addEventListener('gesturestart', function(event) {
        if (event.target.closest('.react-transform-wrapper') || event.target.closest('.react-transform-component')) {
            return;
        }
        event.preventDefault();
      });

      // Register the service worker to support mobile offline caching and install triggers
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Mena Ledger PWA service worker registered:', reg.scope))
            .catch(err => console.error('PWA service worker registration failed:', err));
        });
      }
    </script>
    
  </head>
  <body>
    <div id="app-launch-shell" class="app-launch-shell" role="status" aria-live="polite">
      <div class="app-launch-top">
        <div class="app-launch-brand">
          <img class="app-launch-logo" src="/mena-logo.png" alt="" />
          <div>
            <h1 class="app-launch-title">Mena CRM</h1>
            <div id="app-launch-subtitle" class="app-launch-subtitle">Opening cached workspace</div>
          </div>
        </div>
        <div id="app-launch-status" class="app-launch-status">Local</div>
      </div>
      <div class="app-launch-card">
        <div class="app-launch-grid">
          <div class="app-launch-stat">
            <div class="app-launch-label">Customers</div>
            <div id="app-launch-customers" class="app-launch-value">--</div>
          </div>
          <div class="app-launch-stat">
            <div class="app-launch-label">Inventory</div>
            <div id="app-launch-stock" class="app-launch-value">--</div>
          </div>
          <div class="app-launch-stat">
            <div class="app-launch-label">Purchases</div>
            <div id="app-launch-purchases" class="app-launch-value">--</div>
          </div>
          <div class="app-launch-stat">
            <div class="app-launch-label">Banks</div>
            <div id="app-launch-banks" class="app-launch-value">--</div>
          </div>
        </div>
        <div class="app-launch-bars" aria-hidden="true">
          <div class="app-launch-bar" style="--w: 92%"></div>
          <div class="app-launch-bar" style="--w: 74%"></div>
          <div class="app-launch-bar" style="--w: 84%"></div>
          <div class="app-launch-bar" style="--w: 62%"></div>
        </div>
      </div>
      <div class="app-launch-foot">Using saved local data now. Internet sync will refresh after the app opens.</div>
    </div>
    <script>
      (function() {
        try {
          var counts = [
            ['app-launch-customers', 'mena_inc_customers_v3'],
            ['app-launch-stock', 'mena_inc_stocks_v3'],
            ['app-launch-purchases', 'mena_inc_purchases_v2'],
            ['app-launch-banks', 'mena_inc_bank_accounts_v4']
          ];
          var hasAnyCache = false;
          counts.forEach(function(entry) {
            var el = document.getElementById(entry[0]);
            if (!el) return;
            var raw = localStorage.getItem(entry[1]);
            if (!raw) {
              el.textContent = '0';
              return;
            }
            try {
              var parsed = JSON.parse(raw);
              var count = Array.isArray(parsed) ? parsed.filter(function(item) { return !item || item.isDeleted !== true; }).length : 0;
              el.textContent = String(count);
              hasAnyCache = hasAnyCache || count > 0;
            } catch (_) {
              el.textContent = '0';
            }
          });
          var subtitle = document.getElementById('app-launch-subtitle');
          var status = document.getElementById('app-launch-status');
          if (subtitle) subtitle.textContent = hasAnyCache ? 'Opening saved ledger' : 'Preparing workspace';
          if (status) status.textContent = navigator.onLine ? 'Cached' : 'Offline';
        } catch (_) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
